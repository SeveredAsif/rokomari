services:
  postgres:
    image: postgres:16-alpine
    container_name: rokomari-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentication-service:
    build:
      context: ./authentication-service
    container_name: rokomari-authentication-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      RECOMMENDATION_SERVICE_URL: ${RECOMMENDATION_SERVICE_URL}
      SERVICE_TO_SERVICE_TOKEN: ${SERVICE_TO_SERVICE_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      recommendation-service:
        condition: service_started

  recommendation-service:
    build:
      context: ./recommendation-service
    container_name: rokomari-recommendation-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_TO_SERVICE_TOKEN: ${SERVICE_TO_SERVICE_TOKEN}
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
    container_name: rokomari-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      authentication-service:
        condition: service_started

volumes:
  postgres_data:
