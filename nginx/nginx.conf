worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Helpful for websockets/keep-alive
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream auth_service {
        server authentication-service:8000;
    }

    upstream recommendation_service {
        server recommendation-service:8001;
    }

    upstream productsearch_service {
        server productsearch-service:8002;
    }

    upstream interaction_service {
        server interaction-service:8002;
    }

    upstream frontend_service {
        server frontend:3000;
    }

    server {
        listen 80;

        # Basic health check for nginx itself
        location = /health {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"nginx"}';
        }

        # ---- Service routes (external base paths) ----
        # Auth
        location /auth/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://auth_service/;
        }

        # Recommendation (note: internal service expects /recommendation/*)
        location /recommendation/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://recommendation_service/;
        }

        # Product search
        location /productsearch/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://productsearch_service/;
        }

        # Interaction
        location /interaction/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://interaction_service/;
        }

        # Frontend app (default route)
        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://frontend_service;
        }
    }
}
